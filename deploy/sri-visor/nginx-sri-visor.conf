# ───────────────────────────────────────────────────────────────────────────
# Visor remoto de la descarga asistida SRI — añadir DENTRO del server { } del
# sitio que ya sirve /sistema/public (el mismo dominio con HTTPS).
#
# Flujo: navegador → /sri-visor-ws/?token=XXX → auth_request valida el token con
# el endpoint PHP → si es válido, proxya a websockify (127.0.0.1:6080) → x11vnc:5900 → Xvfb:99
# ───────────────────────────────────────────────────────────────────────────

# 1) Cliente noVNC (estático). Alternativa equivalente: symlink
#    ln -s /usr/share/novnc /var/www/sistema/public/novnc  (y omitir este bloque).
location /sistema/public/novnc/ {
    alias /usr/share/novnc/;
    autoindex off;
}

# 2) Validación interna del token (subrequest de auth_request). NO accesible desde fuera.
location = /sri-visor-auth {
    internal;
    # Reenvía al endpoint del propio sistema, conservando el query (?token=...).
    proxy_pass http://127.0.0.1/sistema/public/modulos/DescargasSri/validarVisorTokenAjax$is_args$args;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    # Si el proyecto vive en un vhost con server_name propio, fija el Host correcto:
    # proxy_set_header Host tu-dominio.com;
}

# 3) WebSocket del visor: valida el token y, si pasa, proxya a websockify (solo loopback).
location /sri-visor-ws/ {
    auth_request /sri-visor-auth;

    proxy_pass http://127.0.0.1:6080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
